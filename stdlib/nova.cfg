# ----------------------------------------------------------------------------
# Nova Language - Editor Configuration
# -----------------------------------------------------------------------------

# LSP / echeck
time_LSP_check = 1         # interval in seconds between error checks

# Editor
tab_size = 4               # tab width in spaces
show_line_numbers = true   # show line numbers
scroll_off = 3             # margin lines when scrolling (like vim's scrolloff)


color_keyword  = blue      # fn let mut if else for while...
color_type     = cyan      # i32 f64 bool string...
color_number   = yellow    # numeric literals
color_string   = yellow    # string literals
color_comment  = black     # comments
color_literal  = magenta   # true false
color_char     = green     # char literals
color_operator = cyan      # operators (+ - * / = < > ...)


# Error checking
# Only files with these extensions will have error checking and auto-compile.
# Use a comma-separated list for multiple extensions.
check_error_extension_file = .npp

# Compilation
# Set compile_file_extension to the extensions that should trigger compilation.
# Set compile_arg to the command to run. Use $FILE as a placeholder for the file.
# Set either to None to disable.
compile_file_extension = None
compile_arg = None
# Example: compile_file_extension = .npp
# Example: compile_arg = n++ $FILE
# Example: compile_arg = n++ $FILE stdlib/extra.nh -O2